<div class="container">
    <div class="topBar" *ngIf="_cameraStreams.length > 1">
        <div class="me">

        </div>
        <div class="attendants">
            <app-gallery-view [allowNavigation]="true" [rawCameraStreams]="nonTalkingFeedStreams"></app-gallery-view>
        </div>
    </div>
    <div class="speakerContainer">
        <app-gallery-view [allowNavigation]="false" [rawCameraStreams]="[talkingFeedStream]"></app-gallery-view>
    </div>
</div>
